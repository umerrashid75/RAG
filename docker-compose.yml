services:
  api:
    build: .
    container_name: papergraph_api
    ports:
      - "8000:8000"
    environment:
      # Free-tier defaults; override in .env.
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-papergraph_dev}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      # Persist the FastEmbed model cache and ingested PDFs across restarts.
      - fastembed_cache:/home/app/.cache/fastembed
      - ./data:/home/app/data
    # Ordering only: the app lazily connects to the stores and reports "degraded"
    # via /healthz until they are reachable, so it must not hard-block on them.
    depends_on:
      - qdrant
      - neo4j
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: papergraph_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: papergraph_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-papergraph_dev}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  fastembed_cache:
