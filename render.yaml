# Render Blueprint — deploy PaperGraph-RAG as a Docker web service.
# Vector + graph stores use managed free tiers (Qdrant Cloud, Neo4j Aura) rather
# than containers, which is the reliable path on a free PaaS.
#
# Setup:
#   1. Create a free Qdrant Cloud cluster      -> https://cloud.qdrant.io
#   2. Create a free Neo4j Aura instance       -> https://neo4j.com/cloud/aura-free
#   3. Get a free Groq API key                 -> https://console.groq.com
#   4. Push this repo to GitHub, then in Render: New > Blueprint > pick this repo.
#   5. Fill the env vars marked `sync: false` in the Render dashboard.
services:
  - type: web
    name: papergraph-rag
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: fastembed
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false   # e.g. https://xxxx.cloud.qdrant.io:6333
      - key: QDRANT_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false   # e.g. neo4j+s://xxxx.databases.neo4j.io
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: TAVILY_API_KEY
        sync: false   # optional: enables CRAG web fallback
